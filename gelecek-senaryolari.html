<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gelecek Senaryoları | Bilgi Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: rgba(15, 23, 42, 0.9); padding: 40px; border-radius: 30px; border: 1px solid #a855f7; }
        h1 { color: #a855f7; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #a855f7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Gelecek Senaryoları</h1>
        <div class="card">
            <h3>+1.5°C Hedefi</h3>
            <p>Eğer karbon salınımını hemen durdurursak, ekosistemi büyük oranda koruyabiliriz.</p>
        </div>
        <div class="card">
            <h3>+3.0°C ve Üzeri</h3>
            <p>Buzulların tamamen erimesi ve kıyı şehirlerinin sular altında kalması kaçınılmaz hale gelir.</p>
        </div>
        <a href="senin-dunyan.html" class="back-btn">← Simülasyona Dön</a>
    </div>
</body>
</html>
